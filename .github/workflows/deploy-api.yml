name: Deploy API

on:
    push:
        branches:
            - main
        paths:
            - 'packages/api/**'
            - 'packages/shared/**'
            - '.github/workflows/deploy-api.yml'
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build shared package
              run: npm run build --workspace=@pitch-tracker/shared

            - name: Build API
              run: npm run build --workspace=@pitch-tracker/api

            - name: Create deployment package
              run: |
                  mkdir -p deploy
                  cp -r packages/api/dist/* deploy/
                  cp packages/api/package.json deploy/

                  # Embed @pitch-tracker/shared directly into node_modules so it is
                  # shipped via FTP and never needs to be resolved by npm on the server
                  mkdir -p deploy/node_modules/@pitch-tracker/shared
                  cp -r packages/shared/dist/. deploy/node_modules/@pitch-tracker/shared/dist/
                  cp packages/shared/package.json deploy/node_modules/@pitch-tracker/shared/

                  # Remove @pitch-tracker/shared from package.json so server-side
                  # npm install does not attempt to reinstall or resolve it
                  node -e "
                    const fs = require('fs');
                    const pkg = JSON.parse(fs.readFileSync('deploy/package.json', 'utf8'));
                    delete pkg.dependencies['@pitch-tracker/shared'];
                    fs.writeFileSync('deploy/package.json', JSON.stringify(pkg, null, 4));
                  "

            - name: Install production dependencies in deploy folder
              run: |
                  cd deploy
                  npm install --omit=dev

            - name: Deploy via FTP to Namecheap
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_SERVER }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  protocol: ftps
                  port: 21
                  local-dir: ./deploy/
                  server-dir: ./${{ secrets.API_DIRECTORY || 'bt_api' }}/
                  dangerous-clean-slate: false
                  log-level: verbose
                  exclude: |
                      **/.git*
                      **/.git*/**
                      **/node_modules/**
                      !**/node_modules/@pitch-tracker/**
                      **/.env*

            - name: Setup application on Namecheap
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  password: ${{ secrets.SSH_PASSWORD }}
                  port: 21098
                  debug: true
                  script: |
                      set -x
                      echo "===== Starting deployment setup ====="

                      if [ -f ~/.bashrc ]; then source ~/.bashrc; fi
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

                      echo "Node.js version: $(node --version 2>&1 || echo 'not found')"
                      echo "npm version: $(npm --version 2>&1 || echo 'not found')"

                      cd ~/${{ secrets.API_DIRECTORY || 'bt_api' }}

                      echo "Files in deployment directory:"
                      ls -la

                      if [ ! -f "package.json" ]; then
                        echo "ERROR: package.json not found!"
                        exit 1
                      fi

                      # Verify @pitch-tracker/shared arrived via FTP
                      if [ -f "node_modules/@pitch-tracker/shared/dist/index.js" ]; then
                        echo "@pitch-tracker/shared present in node_modules"
                      else
                        echo "ERROR: @pitch-tracker/shared missing from node_modules!"
                        exit 1
                      fi

                      # Install remaining production dependencies (shared is already in node_modules)
                      echo "Installing production dependencies..."
                      npm install --production --verbose

                      echo "===== Deployment completed successfully ====="
