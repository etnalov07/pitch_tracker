appId: ${APP_ID}
---
# Create Game screen - verify new game form fields
- runFlow: login.yaml

# Navigate to new game via FAB on dashboard
- tapOn:
    id: "dashboard-new-game-fab"
- waitForAnimationToEnd

# Wait for the new game screen to load
- extendedWaitUntil:
    visible: "New Game"
    timeout: 10000

# Verify form fields
- assertVisible: "New Game"
- assertVisible: "Your Team"

# Wait for teams to load (the home/away label uses real copy from the screen)
- extendedWaitUntil:
    visible: "Your team is playing:"
    timeout: 10000

# Verify Home/Away selector
- assertVisible: "Home"
- assertVisible: "Away"

# Verify text input fields
- assertVisible:
    id: "new-game-opponent-input"
- assertVisible: "Game Date"
- assertVisible: "Game Time"

# Scroll down to see remaining fields
- scrollUntilVisible:
    element: "Location (optional)"
    direction: DOWN
- assertVisible: "Location (optional)"

# Verify create button is present (and disabled until opponent name entered)
- scrollUntilVisible:
    element:
      id: "new-game-create-button"
    direction: DOWN
- assertVisible:
    id: "new-game-create-button"

# Go back without creating
- back
