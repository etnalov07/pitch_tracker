appId: ${APP_ID}
---
# Shared login flow - reusable by other flows.
# Targets testIDs added in app/(auth)/login.tsx so refactors that change copy
# don't silently break the suite.
- launchApp:
    clearState: true

# Wait for login screen to load
- assertVisible: "PitchChart"
- assertVisible: "Sign in to your account"

# Enter email
- tapOn:
    id: "login-email-input"
- inputText: ${EMAIL}
- hideKeyboard

# Enter password
- tapOn:
    id: "login-password-input"
- inputText: ${PASSWORD}
- hideKeyboard

# Tap Sign In
- tapOn:
    id: "login-submit-button"

# Wait for dashboard to appear
- extendedWaitUntil:
    visible: "Welcome"
    timeout: 15000
